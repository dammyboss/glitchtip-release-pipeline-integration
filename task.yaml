id: glitchtip-release-pipeline-integration
prompt: |
  [Context]
  You are the on-call Platform Engineer for Bleater, a microservices social
  platform that runs on Kubernetes (k3s) and deploys through Gitea Actions +
  ArgoCD. The team has been chasing a familiar pain for weeks: when an error
  spike shows up in GlitchTip (the self-hosted Sentry-compatible error
  tracker), nobody can tell which deploy introduced it, whether a release
  was ever finalized, or whether a deploy of that version actually reached
  production. GlitchTip's own UI shows error counts but has no release,
  commit, or deploy context because the CI/CD pipelines never tell GlitchTip
  what's happening.

  GlitchTip exposes a Sentry-compatible release API. The platform team has
  decided this morning that every Bleater service deploy must announce a
  release record to GlitchTip — version stamped with the deploy's git SHA,
  with the commit reference preserved on the record, and finalized so its
  dateReleased timestamp reflects when the deploy actually shipped (not
  when the placeholder record was first created). Three services are in
  scope: auth-service, bleat-service, and api-gateway.

  [Task]
  Wire the release lifecycle into the deploy pipelines for the three
  services and verify it end-to-end. Each service's pipeline must, on every
  push:
   - Announce a release with the deploy's commit SHA as the version, and
     with the same SHA recorded as the release's commit ref
   - Finalize the release after creation so its dateReleased timestamp is
     set to a real ship time, distinct from the initial create timestamp,
     and the commit ref stays bound to the release record after the
     finalize step completes

  The CI/CD credential should live so the workflow can authenticate without
  a static value being baked into the repo, and the integration must work
  fleet-wide: each of the three services should accumulate at least two
  release records over the course of your validation.

  [Constraints]
  Do NOT use any interactive commands. All work must run non-interactively.
  Permissions needed are already given; treat the running GlitchTip server
  as a closed third-party system with platform-team-mandated admission
  rules — your release announcements must comply with whatever schema /
  auth contracts the platform team enforces, or they will be rejected.
  The environment runs automated credential rotation, data-retention
  enforcement, and workflow reconciliation on a fast schedule — your
  integration must remain functional under those long-running cleanup
  jobs across multiple commit cycles.

  [Notes]
  GlitchTip is reachable and Gitea is reachable using API. Credentials for
  every service in the environment are catalogued. The platform team
  documents its admission contracts (token format, required schemas,
  retention windows, allowed network paths from runners) somewhere
  in-cluster — find the documentation before you start engineering. The
  notes from a prior attempt at this work, that one of the senior engineers
  started before going on leave, were kept somewhere I cannot seem to find.

metadata:
  category: platform_engineering
  difficulty: hard
